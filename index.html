<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Centro Global de Monitoramento</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
background:#c4170c;
padding:20px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
padding:12px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

nav a:hover{
color:#ff4444;
}

#conteudo{
height:90vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:20px;
}

.item{
margin-bottom:15px;
border-left:3px solid red;
padding-left:10px;
}

button{
padding:12px;
font-size:16px;
background:red;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
🌍 CENTRO GLOBAL DE MONITORAMENTO
</header>

<nav>

<a onclick="radar()">✈️ Radar Aviões</a>

<a onclick="militares()">🛩 Aviões Militares</a>

<a onclick="conflitos()">🌍 Conflitos</a>

<a onclick="guerra()">🌍 Mapa de Guerra</a>

<a onclick="navios()">🚢 Navios Militares</a>

<a onclick="foguetes()">🚀 Lançamentos</a>

<a onclick="noticias()">📰 Notícias</a>

</nav>

<div id="conteudo">

<div class="feed">

<h2>Painel de Monitoramento Global</h2>

<p>Escolha uma ferramenta no menu acima.</p>

</div>

</div>

<script>

function radar(){

document.getElementById("conteudo").innerHTML=`
<iframe src="https://globe.adsbexchange.com/"></iframe>
`

}

function militares(){

document.getElementById("conteudo").innerHTML=`
<iframe src="https://globe.adsbexchange.com/?mil"></iframe>
`

}

function conflitos(){

document.getElementById("conteudo").innerHTML=`
<iframe src="https://liveuamap.com/"></iframe>
`

}

function guerra(){

document.getElementById("conteudo").innerHTML=`
<iframe src="https://liveuamap.com/"></iframe>
`

}

function navios(){

document.getElementById("conteudo").innerHTML=`

<div class="feed">

<h2>🚢 Monitoramento de Navios Militares</h2>

<p>Alguns navios militares podem ser vistos em radares marítimos públicos quando o AIS está ativo.</p>

<button onclick="window.open('https://www.vesselfinder.com/aismap','_blank')"
style="padding:12px;font-size:16px;background:red;color:white;border:none;border-radius:5px;cursor:pointer;">

Abrir Radar Marítimo

</button>

</div>

`

}

async function foguetes(){

let res=await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5")

let data=await res.json()

let html="<div class='feed'><h2>🚀 Lançamentos Espaciais</h2>"

data.results.forEach(l=>{

html+=`
<div class="item">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`

})

html+="</div>"

document.getElementById("conteudo").innerHTML=html

}

async function noticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml"

let res=await fetch(url)

let data=await res.json()

let html="<div class='feed'><h2>📰 Notícias de Conflitos</h2>"

data.items.slice(0,10).forEach(n=>{

let resumo=n.title.split(" ").slice(0,10).join(" ")

html+=`
<div class="item">
📰 ${n.title}<br>
🤖 Resumo IA: ${resumo}...
</div>
`

})

html+="</div>"

document.getElementById("conteudo").innerHTML=html

}

let alerta = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg")

function tocarAlerta(){

alerta.play()

}

function simularDados(){

document.getElementById("ataques").innerText =
Math.floor(Math.random()*50000)+10000

document.getElementById("paises").innerText =
Math.floor(Math.random()*120)+20

document.getElementById("alertas").innerText =
Math.floor(Math.random()*300)+50

setInterval(()=>{

document.getElementById("ataques").innerText =
Math.floor(Math.random()*50000)+10000

document.getElementById("paises").innerText =
Math.floor(Math.random()*120)+20

document.getElementById("alertas").innerText =
Math.floor(Math.random()*300)+50

},5000)

}

</script>

</body>
</html>
