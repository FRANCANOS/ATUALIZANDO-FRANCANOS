<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Radar de Guerras</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

header{
background:#020617;
padding:20px;
}

h1{
color:#ef4444;
}

#news{
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
margin-bottom:15px;
border-radius:8px;
}

</style>
</head>

<body>

<header>
<h1>🌍 Radar de Guerras</h1>
<p>Atualização automática de conflitos no mundo</p>
</header>

<div id="news"></div>

<script>

async function carregarNoticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml"

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.slice(0,10).forEach(n=>{

html+=`
<div class="card">
<h2>${n.title}</h2>
<p>${n.description}</p>
<small>${n.pubDate}</small>
</div>
`

})

document.getElementById("news").innerHTML=html

}

carregarNoticias()

setInterval(carregarNoticias,60000)

</script>

</body>

</html>
