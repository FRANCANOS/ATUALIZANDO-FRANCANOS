<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel do Biel</title>

<style>

body{
margin:0;
font-family:Courier New, monospace;
background:#050505;
color:#00ff9c;
}

header{
background:#111;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00ff9c;
}

#conteudo{
height:85vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

#alerta{
background:#111;
border-top:1px solid red;
color:red;
padding:8px;
font-size:12px;
text-align:center;
}

</style>

</head>

<body>

<header>

🛰 PAINEL DO BIEL

<div>
🕒 <span id="hora"></span>
</div>

</header>

<div id="conteudo">

<iframe src="https://globe.adsbexchange.com/?mil"></iframe>

</div>

<div id="alerta">

⚠ MONITORAMENTO DE AVIÕES MILITARES ATIVO

</div>

<script>

const hora=document.getElementById("hora")

setInterval(()=>{
hora.innerText=new Date().toLocaleTimeString()
},1000)

</script>

</body>
</html>
