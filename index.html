<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal Local</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#c4170c;
color:white;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns: repeat(3,1fr);
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:5px;
overflow:hidden;
box-shadow:0 0 5px rgba(0,0,0,0.2);
}

.card img{
width:100%;
}

.card h3{
padding:10px;
}

.card a{
text-decoration:none;
color:black;
}

.card p{
padding:0 10px 10px 10px;
color:#555;
}

</style>

</head>

<body>

<header>
Meu Portal de Notícias
</header>

<div class="container">

<div class="card">
<a href="https://www.nytimes.com">
<img src="https://static01.nyt.com/images/2024/01/01/world/sample.jpg">
<h3>Notícia internacional importante</h3>
<p>Resumo da notícia que você colocou manualmente.</p>
</a>
</div>

<div class="card">
<a href="https://www.nytimes.com">
<img src="https://static01.nyt.com/images/2024/01/01/business/sample.jpg">
<h3>Economia mundial</h3>
<p>Outra notícia de exemplo.</p>
</a>
</div>

<div class="card">
<a href="https://www.nytimes.com">
<img src="https://static01.nyt.com/images/2024/01/01/technology/sample.jpg">
<h3>Tecnologia</h3>
<p>Matéria sobre tecnologia.</p>
</a>
</div>

</div>

</body>
</html>
