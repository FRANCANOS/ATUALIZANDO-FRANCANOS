<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel do Biel</title>

<style>

body{
margin:0;
font-family:Courier New, monospace;
background:#050505;
color:#00ff9c;
}

header{
background:#111;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
font-size:16px;
border-bottom:2px solid #00ff9c;
}

#painel{
display:flex;
flex-direction:column;
gap:10px;
padding:10px;
background:#0a0a0a;
}

.botao{
background:#111;
border:1px solid #00ff9c;
color:#00ff9c;
padding:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
width:100%;
}

.botao:active{
background:#00ff9c;
color:black;
}

#conteudo{
height:75vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

#alerta{
background:#111;
border-top:1px solid red;
color:red;
padding:8px;
font-size:12px;
text-align:center;
}

</style>

</head>

<body>

<header>

🛰 PAINEL DO BIEL

<div>
🕒 <span id="hora"></span>
</div>

</header>

<div id="painel">

<button class="botao" onclick="radar()">🛩 AVIÕES MILITARES</button>

<button class="botao" onclick="missoes()">🚀 ATAQUES / MÍSSEIS</button>

</div>

<div id="conteudo">

<iframe src="https://globe.adsbexchange.com/?mil"></iframe>

</div>

<div id="alerta">

⚠ MONITORAMENTO GLOBAL ATIVO

</div>

<script>

const hora = document.getElementById("hora");
const conteudo = document.getElementById("conteudo");

setInterval(()=>{
hora.innerText=new Date().toLocaleTimeString();
},1000);

function radar(){
conteudo.innerHTML=`<iframe src="https://globe.adsbexchange.com/?mil"></iframe>`;
}

function missoes(){
window.open("https://liveuamap.com/","_blank");
}

</script>

</body>
</html>
