<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Radar de Guerras Mundiais</title>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
}

h1{
color:#ff4444;
}

#news{
max-width:800px;
margin:auto;
}

.card{
background:#1e293b;
padding:15px;
margin:15px;
border-radius:10px;
text-align:left;
}

a{
color:#38bdf8;
text-decoration:none;
}
</style>
</head>

<body>

<h1>🌍 Radar de Guerras Mundiais</h1>
<p>Atualização automática de notícias</p>

<div id="news"></div>

<script>

async function carregarNoticias(){

let url = "https://api.allorigins.win/raw?url=" +
encodeURIComponent("https://news.google.com/rss/search?q=war&hl=en-US&gl=US&ceid=US:en");

let resposta = await fetch(url);
let texto = await resposta.text();

let parser = new DOMParser();
let xml = parser.parseFromString(texto,"text/xml");

let items = xml.querySelectorAll("item");

let html="";

items.forEach((item,i)=>{

if(i<10){

let titulo=item.querySelector("title").textContent;
let link=item.querySelector("link").textContent;

html+=`
<div class="card">
<h3>${titulo}</h3>
<a href="${link}" target="_blank">Ver notícia</a>
</div>
`;

}

});

document.getElementById("news").innerHTML=html;

}

carregarNoticias();

setInterval(carregarNoticias,60000);

</script>

</body>
</html>
