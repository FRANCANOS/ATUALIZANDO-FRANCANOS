<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal do Biel</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0b0b;
  color: white;
}

header {
  background: #c4170c;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

nav {
  background: #111;
  padding: 12px;
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

nav a {
  color: white;
  text-decoration: none;
  font-weight: bold;
  cursor: pointer;
}

nav a:hover {
  color: #ff4444;
}

#conteudo {
  height: 90vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

.feed {
  padding: 20px;
}

.item {
  margin-bottom: 15px;
  border-left: 3px solid red;
  padding-left: 10px;
}

.painel {
  display: flex;
  gap: 20px;
  margin-top: 10px;
}

.card {
  background: #1a1a1a;
  padding: 10px;
  border-radius: 5px;
}
</style>

</head>

<body>

<header>
🌍 PORTAL DO BIEL
</header>

<nav>
  <a onclick="radar()">✈️ Radar Aviões</a>
  <a onclick="militares()">🛩 Aviões Militares</a>
  <a onclick="conflitos()">🌍 Conflitos</a>
  <a onclick="ciber()">💻 Ciberataques</a>
  <a onclick="foguetes()">🚀 Lançamentos</a>
  <a onclick="navios()">🚢 Navios Militares</a>
  <a onclick="noticias()">📰 Notícias</a>
</nav>

<div id="conteudo">

<div class="feed">
  <h2>Painel de Monitoramento</h2>
  <p>Escolha uma ferramenta no menu acima.</p>
</div>

</div>

<script>

function radar() {
  document.getElementById("conteudo").innerHTML = `
  <iframe src="https://globe.adsbexchange.com/"></iframe>
  `;
}

function militares() {
  document.getElementById("conteudo").innerHTML = `
  <iframe src="https://globe.adsbexchange.com/?mil"></iframe>
  `;
}

function conflitos() {
  document.getElementById("conteudo").innerHTML = `
  <iframe src="https://liveuamap.com/"></iframe>
  `;
}

function ciber() {
  document.getElementById("conteudo").innerHTML = ` 
  <div style="display:flex;flex-direction:column;height:100%">
    <div class="feed">
      <h2>💻 Monitoramento de Ciberataques</h2>
      <p>Ataques detectados em tempo quase real.</p>
      <div class="painel">
        <div class="card">
          🌍 Ataques Globais Hoje<br>
          <b id="ataques">Carregando...</b>
        </div>
        <div class="card">
          ⚠️ Países Atacados<br>
          <b id="paises">Carregando...</b>
        </div>
        <div class="card">
          🚨 Alertas Ativos<br>
          <b id="alertas">Carregando...</b>
        </div>
      </div>
    </div>
    <iframe src="https://livethreatmap.radware.com/" style="flex:1"></iframe>
  </div>
  `;
  simularDados();
}

function simularDados() {
  document.getElementById("ataques").innerText = Math.floor(Math.random() * 50000) + 10000;
  document.getElementById("paises").innerText = Math.floor(Math.random() * 120) + 20;
  document.getElementById("alertas").innerText = Math.floor(Math.random() * 300) + 50;

  setInterval(() => {
    document.getElementById("ataques").innerText = Math.floor(Math.random() * 50000) + 10000;
    document.getElementById("paises").innerText = Math.floor(Math.random() * 120) + 20;
    document.getElementById("alertas").innerText = Math.floor(Math.random() * 300) + 50;
  }, 5000);
}

async function foguetes() {
  let res = await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5");
  let data = await res.json();

  let html = "<div class='feed'><h2>🚀 Lançamentos Espaciais</h2>";

  data.results.forEach(l => {
    html += `
    <div class="item">
    🚀 ${l.name}<br>
    📅 ${l.net}
    </div>
    `;
  });

  html += "</div>";

  document.getElementById("conteudo").innerHTML = html;
}

async function noticias() {
  let url = "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml";
  let res = await fetch(url);

  let data = await res.json();

  let html = "<div class='feed'><h2>📰 Notícias de Conflitos</h2>";

  data.items.slice(0, 10).forEach(n => {
    let resumo = n.title.substring(0, 80);

    html += `
    <div class="item">
    📰 ${n.title}<br>
    Resumo: ${resumo}...
    </div>
    `;
  });

  html += "</div>";

  document.getElementById("conteudo").innerHTML = html;
}

function navios() {
  document.getElementById("conteudo").innerHTML = `
  <div class="feed">
  <h2>🚢 Monitoramento de Navios Militares</h2>
  <p>Monitoramento em tempo real de navios militares, porta-aviões e submarinos.</p>
  <div id="naviosList"></div>
  </div>
  `;

  mostrarNavios();
}

async function mostrarNavios() {

  const data = [
    { name: "USS Nimitz", type: "Porta-aviões", latitude: "23.122", longitude: "131.512", status: "Em operação" },
    { name: "USS Ohio", type: "Submarino nuclear", latitude: "22.033", longitude: "132.765", status: "Em operação" }
  ];

  let html = '<h3>Navios Recentes</h3>';

  data.forEach(navio => {
    html += `
      <div class="item">
        <strong>Nome:</strong> ${navio.name} <br>
        <strong>Tipo:</strong> ${navio.type} <br>
        <strong>Posição:</strong> Latitude: ${navio.latitude}, Longitude: ${navio.longitude} <br>
        <strong>Status:</strong> ${navio.status}
      </div>
    `;
  });

  document.getElementById('naviosList').innerHTML = html;
}

</script>

</body>
</html>
