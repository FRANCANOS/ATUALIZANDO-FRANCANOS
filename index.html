<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Monitor Global</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
}

header{
background:#c4170c;
padding:18px;
font-size:26px;
font-weight:bold;
}

nav{
background:#111;
padding:10px;
}

nav a{
color:white;
margin-right:20px;
text-decoration:none;
font-weight:bold;
}

nav a:hover{
color:#ff4444;
}

.grid{

display:grid;
grid-template-columns:2fr 1fr;
grid-template-rows:50vh 50vh 50vh;
gap:10px;
padding:10px;

}

.box{
background:#111;
border:1px solid #333;
border-radius:6px;
overflow:hidden;
}

.box h3{
margin:0;
padding:10px;
background:#1a1a1a;
border-bottom:1px solid #333;
color:#ff4444;
}

iframe{
width:100%;
height:100%;
border:none;
}

.feed{
padding:10px;
overflow:auto;
height:100%;
}

.item{
margin-bottom:10px;
border-left:3px solid red;
padding-left:10px;
}

</style>

</head>

<body>

<header>
🌍 CENTRO GLOBAL DE MONITORAMENTO
</header>

<nav>

<a href="#">Início</a>
<a href="#">Radar</a>
<a href="#">Conflitos</a>
<a href="#">Satélites</a>
<a href="#">Navios</a>
<a href="#">Lançamentos</a>

</nav>

<div class="grid">

<!-- RADAR AVIÕES -->

<div class="box">

<h3>✈️ Radar de Aviões</h3>

<iframe src="https://globe.adsbexchange.com/"></iframe>

</div>


<!-- NAVIOS -->

<div class="box">

<h3>🚢 Rastreamento de Navios</h3>

<iframe src="https://www.vesselfinder.com/aismap"></iframe>

</div>


<!-- SATELITES -->

<div class="box">

<h3>🛰 Satélites em Órbita</h3>

<iframe src="https://satellitemap.space/"></iframe>

</div>


<!-- MAPA DE CONFLITOS -->

<div class="box">

<h3>🌍 Conflitos Globais</h3>

<iframe src="https://liveuamap.com/"></iframe>

</div>


<!-- LANÇAMENTOS -->

<div class="box">

<h3>🚀 Próximos Lançamentos Espaciais</h3>

<div class="feed" id="rockets"></div>

</div>


<!-- NOTICIAS COM RESUMO IA -->

<div class="box">

<h3>🧠 Notícias com Resumo Automático</h3>

<div class="feed" id="news"></div>

</div>

</div>

<script>

async function carregarNoticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml"

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.slice(0,10).forEach(n=>{

let resumo=n.title.substring(0,80)

html+=`
<div class="item">
📰 ${n.title}<br>
🤖 Resumo: ${resumo}...
</div>
`

})

document.getElementById("news").innerHTML=html

}

async function carregarLancamentos(){

let res=await fetch("https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=5")

let data=await res.json()

let html=""

data.results.forEach(l=>{

html+=`
<div class="item">
🚀 ${l.name}<br>
📅 ${l.net}
</div>
`

})

document.getElementById("rockets").innerHTML=html

}

carregarNoticias()
carregarLancamentos()

setInterval(carregarNoticias,30000)

</script>

</body>
</html>
