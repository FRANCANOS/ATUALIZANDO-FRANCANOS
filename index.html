<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Atualizando Francanos</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background:#f2f2f2;
margin:0;
}

header{
background:#c4170c;
color:white;
padding:15px;
font-size:30px;
font-weight:bold;
}

nav{
background:white;
padding:10px;
border-bottom:1px solid #ddd;
}

nav a{
margin-right:20px;
text-decoration:none;
color:#c4170c;
font-weight:bold;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.noticia{
background:white;
margin-bottom:20px;
border-radius:5px;
overflow:hidden;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.noticia img{
width:100%;
}

.noticia h2{
padding:15px;
margin:0;
color:#c4170c;
}

.noticia p{
padding:0 15px 15px 15px;
}

.data{
color:gray;
font-size:13px;
padding:0 15px 10px 15px;
}

</style>
</head>

<body>

<header>
ATUALIZANDO FRANCANOS
</header>

<nav>
<a href="index.html">Início</a>
<a href="guerras/israel.html">Israel</a>
<a href="guerras/ucrania.html">Ucrânia</a>
</nav>

<div class="container">

<div id="news"></div>

</div>

<script>

async function carregarNoticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml"

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.slice(0,10).forEach(n=>{

let imagem = n.thumbnail || "https://upload.wikimedia.org/wikipedia/commons/3/3a/News_icon.png"

html+=`
<div class="noticia">

<img src="${imagem}">

<h2>${n.title}</h2>

<p class="data">${n.pubDate}</p>

<p>${n.description}</p>

</div>
`

})

document.getElementById("news").innerHTML=html

}

carregarNoticias()

setInterval(carregarNoticias,60000)

</script>

</body>
</html>
