<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live News</title>

<style>
body{
    font-family: Georgia, serif;
    background:#f4f4f4;
    margin:40px;
}

h1{
    text-align:center;
}

#news{
    max-width:800px;
    margin:auto;
}

.article{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
}

.article a{
    text-decoration:none;
    font-weight:bold;
    color:black;
}
</style>
</head>

<body>

<h1>📰 Live News</h1>

<div id="news">Carregando notícias...</div>

<script>

async function carregarNoticias(){

    const url = "https://api.rss2json.com/v1/api.json?rss_url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml";

    const resposta = await fetch(url);
    const dados = await resposta.json();

    let html = "";

    dados.items.slice(0,10).forEach(noticia => {

        html += `
        <div class="article">
        <a href="${noticia.link}" target="_blank">
        ${noticia.title}
        </a>
        <p>${noticia.pubDate}</p>
        </div>
        `;

    });

    document.getElementById("news").innerHTML = html;
}

carregarNoticias();

setInterval(carregarNoticias, 30000); // atualiza a cada 30 segundos

</script>

</body>
</html>
