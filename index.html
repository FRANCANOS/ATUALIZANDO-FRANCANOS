<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live News</title>

<style>
body{
    font-family: Georgia, serif;
    background:#f4f4f4;
    margin:30px;
}

h1{
    text-align:center;
}

#news{
    max-width:1000px;
    margin:auto;
}

.article{
    display:flex;
    gap:15px;
    background:white;
    padding:15px;
    margin-bottom:15px;
    border:1px solid #ddd;
}

.article img{
    width:180px;
    height:120px;
    object-fit:cover;
}

.article h2{
    margin:0;
    font-size:20px;
}

.article a{
    text-decoration:none;
    color:black;
}

.date{
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<h1>📰 Live News</h1>

<div id="news">Carregando notícias...</div>

<script>

async function carregarNoticias(){

const url = "https://api.rss2json.com/v1/api.json?rss_url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml";

const resposta = await fetch(url);
const dados = await resposta.json();

let html = "";

dados.items.slice(0,10).forEach(noticia => {

let imagem = "";

if(noticia.thumbnail){
    imagem = noticia.thumbnail;
}

html += `
<div class="article">

<img src="${imagem}">

<div>
<a href="${noticia.link}" target="_blank">
<h2>${noticia.title}</h2>
</a>

<div class="date">${noticia.pubDate}</div>
</div>

</div>
`;

});

document.getElementById("news").innerHTML = html;

}

carregarNoticias();
setInterval(carregarNoticias,30000);

</script>

</body>
</html>
