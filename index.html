<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Global War Radar</title>

<style>

body{
font-family:Arial;
background:black;
color:#00ff9c;
margin:0;
}

header{
background:#020617;
padding:20px;
text-align:center;
border-bottom:1px solid #00ff9c;
}

h1{
font-size:40px;
letter-spacing:2px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.radar{
width:250px;
height:250px;
border:3px solid #00ff9c;
border-radius:50%;
margin:auto;
position:relative;
animation:spin 6s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

.radar::after{
content:"";
position:absolute;
width:2px;
height:250px;
background:#00ff9c;
left:50%;
top:0;
}

.card{
background:#020617;
padding:20px;
margin-top:20px;
border-left:4px solid red;
box-shadow:0 0 10px #00ff9c;
}

.live{
color:red;
font-weight:bold;
}

.time{
color:gray;
font-size:12px;
}

</style>

</head>

<body>

<header>

<h1>🌍 GLOBAL WAR RADAR</h1>
<p>Sistema de Monitoramento de Conflitos</p>

</header>

<div class="container">

<div class="radar"></div>

<h2>🔴 LIVE WAR UPDATES</h2>

<div id="news"></div>

</div>

<script>

async function carregarNoticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml"

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.slice(0,15).forEach(n=>{

html+=`
<div class="card">

<h3>${n.title} <span class="live">LIVE</span></h3>

<p>${n.description}</p>

<div class="time">${n.pubDate}</div>

</div>
`

})

document.getElementById("news").innerHTML=html

}

carregarNoticias()

setInterval(carregarNoticias,60000)

</script>

</body>
</html>
