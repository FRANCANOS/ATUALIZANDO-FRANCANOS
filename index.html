<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FRANCA</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.topbar{
background:#c4170c;
color:white;
padding:15px;
font-size:36px;
font-weight:bold;
}

.menu{
background:#a50f06;
padding:10px;
display:flex;
gap:20px;
flex-wrap:wrap;
}

.menu a{
color:white;
text-decoration:none;
}

/* breaking news */

.breaking{
background:black;
color:white;
padding:10px;
font-weight:bold;
display:flex;
gap:10px;
}

.alert{
color:red;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0}
100%{opacity:1}
}

.ticker{
overflow:hidden;
white-space:nowrap;
}

.ticker span{
display:inline-block;
animation:scroll 25s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:20px;
}

.card{
background:white;
border-radius:6px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h2{
padding:10px;
margin:0;
}

.main img{
height:380px;
}

.main h2{
font-size:28px;
}

.small img{
height:120px;
}

.small h2{
font-size:16px;
}

.footer{
text-align:center;
padding:20px;
background:white;
margin-top:30px;
}

/* celular */

@media(max-width:800px){

.grid{
grid-template-columns:1fr;
}

.main img{
height:250px;
}

}

</style>
</head>

<body>

<div class="topbar">
FRANCA
</div>

<div class="menu">
<a href="#">Últimas</a>
<a href="#">Mundo</a>
<a href="#">Tecnologia</a>
<a href="#">Economia</a>
<a href="#">Ciência</a>
<a href="#">Esportes</a>
</div>

<div class="breaking">

<div class="alert">
● BREAKING
</div>

<div class="ticker">
<span id="ticker">Carregando...</span>
</div>

</div>

<div class="container">

<div id="news" class="grid">
Carregando notícias...
</div>

</div>

<div class="footer">
Portal FRANCA • Notícias em tempo real
</div>

<script>

let headlines=[];

async function traduzir(texto){

let url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(texto)}&langpair=en|pt`;

let res=await fetch(url);
let data=await res.json();

return data.responseData.translatedText;

}

async function carregarNoticias(){

const url="https://api.rss2json.com/v1/api.json?rss_url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml";

const res=await fetch(url);
const data=await res.json();

let html="";

headlines=[];

for(let i=0;i<9;i++){

let n=data.items[i];

let titulo=await traduzir(n.title);

let img=n.thumbnail || "https://picsum.photos/600/400?random="+i;

headlines.push(titulo);

if(i==0){

html+=`
<div class="card main">
<img src="${img}">
<h2>${titulo}</h2>
</div>
`;

}else{

html+=`
<div class="card small">
<img src="${img}">
<h2>${titulo}</h2>
</div>
`;

}

}

document.getElementById("news").innerHTML=html;

document.getElementById("ticker").innerText=headlines.join(" • ");

}

carregarNoticias();

setInterval(carregarNoticias,10000);

</script>

</body>
</html>
