<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Atualizando Francanos</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#f4f4f4;
}

/* TOPO */

header{
background:#c4170c;
color:white;
padding:15px 30px;
font-size:28px;
font-weight:bold;
}

/* MENU */

nav{
background:white;
padding:12px 30px;
border-bottom:1px solid #ddd;
}

nav a{
margin-right:20px;
text-decoration:none;
color:#c4170c;
font-weight:bold;
}

/* URGENTE */

.breaking{
background:#111;
color:white;
padding:10px 30px;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

/* PRINCIPAL */

.principal{
background:white;
border-radius:6px;
overflow:hidden;
margin-bottom:30px;
}

.principal img{
width:100%;
}

.principal h1{
padding:15px;
margin:0;
color:#c4170c;
}

.principal p{
padding:0 15px 15px 15px;
}

/* NOTICIAS */

.noticia{
background:white;
margin-bottom:20px;
border-radius:6px;
overflow:hidden;
}

.noticia img{
width:100%;
}

.noticia h2{
padding:12px;
margin:0;
}

.noticia p{
padding:0 12px 12px 12px;
font-size:14px;
}

/* BOTÃO TRADUZIR */

.translate{
position:fixed;
bottom:20px;
right:20px;
}

.translate button{
background:#c4170c;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

footer{
text-align:center;
padding:20px;
color:gray;
}

</style>

</head>

<body>

<header>
ATUALIZANDO FRANCANOS
</header>

<nav>

<a href="index.html">Início</a>
<a href="guerras/israel.html">Israel</a>
<a href="guerras/ucrania.html">Ucrânia</a>
<a href="#">Mundo</a>
<a href="#">Tecnologia</a>

</nav>

<div class="breaking">
🔴 URGENTE: Atualizações de conflitos internacionais
</div>

<div class="container">

<div class="principal">

<img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Gaza_Skyline.jpg">

<h1>Conflito no Oriente Médio continua</h1>

<p>
Novos confrontos foram registrados durante a madrugada.
Autoridades internacionais monitoram a situação.
</p>

</div>

<div id="news"></div>

</div>

<footer>
Portal Atualizando Francanos
</footer>

<div class="translate">
<button onclick="traduzir()">🌐 Traduzir</button>
</div>

<script>

/* TRADUTOR */

function traduzir(){
window.location.href="https://translate.google.com/translate?sl=auto&tl=pt&u="+window.location.href
}

/* NOTÍCIAS AUTOMÁTICAS */

async function carregarNoticias(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://feeds.bbci.co.uk/news/world/rss.xml"

let res=await fetch(url)

let data=await res.json()

let html=""

data.items.slice(0,6).forEach(n=>{

let img=n.thumbnail || "https://upload.wikimedia.org/wikipedia/commons/4/4e/News_icon.png"

html+=`

<div class="noticia">

<img src="${img}">

<h2>${n.title}</h2>

<p>${n.description}</p>

</div>

`

})

document.getElementById("news").innerHTML=html

}

carregarNoticias()

setInterval(carregarNoticias,60000)

</script>

</body>
</html>
