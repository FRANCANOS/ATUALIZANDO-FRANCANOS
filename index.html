<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Centro de Comando</title>

<style>

body{
margin:0;
font-family:Courier New, monospace;
background:#050505;
color:#00ff9c;
}

header{
background:#111;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid #00ff9c;
}

header h1{
margin:0;
font-size:22px;
}

#painel{
display:flex;
gap:10px;
background:#0a0a0a;
padding:10px;
border-bottom:1px solid #00ff9c;
}

.botao{
background:#111;
border:1px solid #00ff9c;
color:#00ff9c;
padding:10px 15px;
cursor:pointer;
font-weight:bold;
}

.botao:hover{
background:#00ff9c;
color:black;
}

#conteudo{
height:85vh;
}

iframe{
width:100%;
height:100%;
border:none;
}

#alerta{
position:fixed;
bottom:10px;
left:10px;
background:#111;
border:1px solid red;
color:red;
padding:10px;
font-size:13px;
}

</style>

</head>

<body>

<header>

<h1>🛰 CENTRO DE COMANDO GLOBAL</h1>

<div>
🕒 <span id="hora"></span>
</div>

</header>

<div id="painel">

<button class="botao" onclick="radar()">🛩 Radar Militar</button>

<button class="botao" onclick="missoes()">🚀 Ataques / Mísseis</button>

</div>

<div id="conteudo">

<iframe src="https://globe.adsbexchange.com/?mil"></iframe>

</div>

<div id="alerta">

⚠ MONITORAMENTO ATIVO<br>
• Aviões militares<br>
• Eventos de combate<br>

</div>

<script>

setInterval(()=>{
hora.innerText=new Date().toLocaleTimeString();
},1000);

function radar(){
conteudo.innerHTML=`<iframe src="https://globe.adsbexchange.com/?mil"></iframe>`;
}

function missoes(){
conteudo.innerHTML=`<iframe src="https://liveuamap.com/"></iframe>`;
}

</script>

</body>
</html>
