<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FRANCA - Notícias Globais</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.topbar{
background:#c4170c;
color:white;
padding:15px;
font-size:36px;
font-weight:bold;
}

.menu{
background:#a50f06;
padding:10px;
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
}

.breaking{
background:black;
color:white;
padding:10px;
overflow:hidden;
white-space:nowrap;
}

.breaking span{
display:inline-block;
animation:scroll 30s linear infinite;
}

@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:2fr 1fr 1fr;
gap:20px;
}

.card{
background:white;
border-radius:6px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card h2{
padding:10px;
margin:0;
}

.main img{
height:350px;
}

.section{
margin-top:40px;
}

.newsbox{
background:white;
padding:15px;
margin-bottom:10px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.footer{
margin-top:40px;
padding:20px;
text-align:center;
background:white;
}

</style>
</head>

<body>

<div class="topbar">
FRANCA
</div>

<div class="menu">
<a href="#">Últimas</a>
<a href="#">Mundo</a>
<a href="#">Guerras</a>
<a href="#">Tecnologia</a>
<a href="#">Economia</a>
</div>

<div class="breaking">
<span id="ticker">Carregando notícias...</span>
</div>

<div class="container">

<div id="news" class="grid">
Carregando...
</div>

<div class="section">

<h2>⚔️ Guerra Rússia x Ucrânia</h2>

<div id="ukraineNews">
Carregando...
</div>

</div>

<div class="section">

<h2>⚠️ Oriente Médio / Irã</h2>

<div id="iranNews">
Carregando...
</div>

</div>

<div class="section">

<h2>🌍 Atualizações Globais</h2>

<div id="globalNews">
Carregando...
</div>

</div>

</div>

<div class="footer">
Portal FRANCA • Monitor global
</div>

<script>

let headlines=[];

async function carregarPrincipais(){

const url="https://api.rss2json.com/v1/api.json?rss_url=https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml";

const res=await fetch(url);
const data=await res.json();

let html="";

headlines=[];

data.items.slice(0,6).forEach((n,i)=>{

let img=n.thumbnail || "https://picsum.photos/600/400?random="+i;

headlines.push(n.title);

if(i==0){

html+=`
<div class="card main">
<img src="${img}">
<h2>${n.title}</h2>
</div>
`;

}else{

html+=`
<div class="card">
<img src="${img}">
<h2>${n.title}</h2>
</div>
`;

}

});

document.getElementById("news").innerHTML=html;

document.getElementById("ticker").innerText=headlines.join(" • ");

}

async function carregarGuerras(){

const url="https://api.rss2json.com/v1/api.json?rss_url=https://rss.nytimes.com/services/xml/rss/nyt/World.xml";

const res=await fetch(url);
const data=await res.json();

let ukraine="";
let iran="";
let global="";

data.items.forEach(n=>{

let t=n.title.toLowerCase();

if(t.includes("ukraine") || t.includes("russia")){

ukraine+=`
<div class="newsbox">
<h3>${n.title}</h3>
<p>${n.pubDate}</p>
<a href="${n.link}" target="_blank">Ler notícia</a>
</div>
`;

}else if(t.includes("iran") || t.includes("israel") || t.includes("middle east")){

iran+=`
<div class="newsbox">
<h3>${n.title}</h3>
<p>${n.pubDate}</p>
<a href="${n.link}" target="_blank">Ler notícia</a>
</div>
`;

}else{

global+=`
<div class="newsbox">
<h3>${n.title}</h3>
<p>${n.pubDate}</p>
<a href="${n.link}" target="_blank">Ler notícia</a>
</div>
`;

}

});

document.getElementById("ukraineNews").innerHTML=ukraine;
document.getElementById("iranNews").innerHTML=iran;
document.getElementById("globalNews").innerHTML=global;

}

carregarPrincipais();
carregarGuerras();

setInterval(carregarPrincipais,15000);
setInterval(carregarGuerras,15000);

</script>

</body>
</html>
