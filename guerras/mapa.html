<!DOCTYPE html>
<html>

<head>

<title>Mapa de Conflitos</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
}

#map{
height:100vh;
}

</style>

</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([30,30],2)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:18
}).addTo(map)

L.marker([31.5,34.8]).addTo(map)
.bindPopup("Conflito em Gaza")

L.marker([50.45,30.52]).addTo(map)
.bindPopup("Conflito na Ucrânia")

</script>

</body>
</html>
